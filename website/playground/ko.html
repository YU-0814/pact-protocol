<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PACT 플레이그라운드 &mdash; 인터랙티브 검증기</title>
  <meta name="description" content="PACT JSON을 붙여넣고 실시간으로 검증하세요. 적합도 등급 확인, 오류 감지, 예제 탐색이 가능합니다.">
  <link rel="stylesheet" href="../style.css">
  <style>
    .playground {
      padding: 2rem 0 4rem;
    }

    .playground__header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .playground__header h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .playground__layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      align-items: start;
    }

    @media (max-width: 900px) {
      .playground__layout {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .panel__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border);
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .panel__title {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .panel__body {
      padding: 1rem;
    }

    #jsonInput {
      width: 100%;
      min-height: 420px;
      background: var(--bg-code);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      resize: vertical;
      outline: none;
      line-height: 1.5;
      tab-size: 2;
    }

    #jsonInput:focus {
      border-color: var(--accent);
    }

    .input-controls {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 0.75rem;
    }

    .type-select {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      background: var(--bg-code);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.45rem 0.75rem;
      outline: none;
    }

    .type-select:focus {
      border-color: var(--accent);
    }

    .example-btns {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.75rem;
    }

    .lang-switch {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .lang-switch a {
      color: var(--accent);
      text-decoration: none;
    }
    .lang-switch a:hover {
      text-decoration: underline;
    }

    /* Results */
    .results-empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .result-summary {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .result-status {
      font-family: var(--font-mono);
      font-size: 1.1rem;
      font-weight: 700;
    }

    .result-status--valid { color: var(--success); }
    .result-status--invalid { color: var(--error); }

    .result-section {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    .result-section:last-child {
      border-bottom: none;
    }

    .result-section__title {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
    }

    .result-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .result-list li {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      padding: 0.35rem 0;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .result-list li .icon {
      flex-shrink: 0;
      font-weight: 700;
      font-size: 0.8rem;
      margin-top: 0.1rem;
    }

    .icon--pass { color: var(--success); }
    .icon--fail { color: var(--error); }
    .icon--warn { color: var(--warning); }
    .icon--info { color: var(--info); }
  </style>
</head>
<body>

  <!-- ===== Header ===== -->
  <header class="site-header">
    <div class="container">
      <a href="/" class="logo">PACT<span>protocol</span></a>
      <button class="nav-toggle" aria-label="메뉴 열기" onclick="document.querySelector('.nav').classList.toggle('open')">&#9776;</button>
      <nav>
        <ul class="nav">
          <li><a href="/docs/">스펙</a></li>
          <li><a href="/playground/ko" class="active">플레이그라운드</a></li>
          <li><a href="/score/">점수</a></li>
          <li><a href="https://github.com/pact-protocol" target="_blank" rel="noopener">GitHub</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- ===== Main ===== -->
  <main class="playground">
    <div class="container">
      <div class="playground__header">
        <h1>PACT 플레이그라운드</h1>
        <p class="text-muted">PACT JSON을 붙여넣으면 구조 검증, 타입 감지, 적합도 등급을 확인할 수 있습니다.</p>
        <p class="lang-switch"><a href="/playground/">English</a> | 한국어</p>
      </div>

      <div class="playground__layout">
        <!-- 입력 패널 -->
        <div class="panel">
          <div class="panel__header">
            <span class="panel__title">입력</span>
            <select class="type-select" id="typeSelect">
              <option value="auto">자동 감지</option>
              <option value="discovery">디스커버리 (pact.json)</option>
              <option value="response">응답 (데이터)</option>
            </select>
          </div>
          <div class="panel__body">
            <textarea id="jsonInput" placeholder="여기에 PACT JSON을 붙여넣으세요..." spellcheck="false"></textarea>
            <div class="input-controls">
              <button class="btn btn--primary btn--sm" onclick="validate()">검증하기</button>
              <button class="btn btn--ghost btn--sm" onclick="formatJson()">정렬</button>
              <button class="btn btn--ghost btn--sm" onclick="clearInput()">지우기</button>
            </div>
            <div class="example-btns">
              <span class="text-muted text-sm">예제 불러오기:</span>
              <button class="btn btn--ghost btn--sm" onclick="loadExample('discovery')">디스커버리</button>
              <button class="btn btn--ghost btn--sm" onclick="loadExample('blog')">블로그 응답</button>
              <button class="btn btn--ghost btn--sm" onclick="loadExample('restaurant')">레스토랑</button>
            </div>
          </div>
        </div>

        <!-- 결과 패널 -->
        <div class="panel">
          <div class="panel__header">
            <span class="panel__title">결과</span>
            <span id="resultBadge"></span>
          </div>
          <div class="panel__body" id="resultsBody">
            <div class="results-empty">
              PACT JSON을 입력하고 <strong>검증하기</strong>를 클릭하세요.
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- ===== Footer ===== -->
  <footer class="site-footer">
    <div class="container">
      <ul class="footer-links">
        <li><a href="/docs/">스펙 문서</a></li>
        <li><a href="/">홈</a></li>
        <li><a href="https://github.com/pact-protocol" target="_blank" rel="noopener">GitHub</a></li>
      </ul>
      <p>Apache 2.0 License &middot; PACT Working Group 2026</p>
    </div>
  </footer>

  <script>
    // =============================================
    // PACT 검증기 (한국어)
    // =============================================

    var EXAMPLES = {
      discovery: {
        pact: "1.0",
        site: "pricefinder.kr",
        description: "한국 시장을 위한 AI 친화 가격 비교 마켓플레이스",
        schemas: [
          "pact:commerce/product@1"
        ],
        endpoints: {
          "pact:commerce/product@1": {
            list: "/pact/products",
            item: "/pact/products/{id}",
            search: "/pact/products?q={query}"
          }
        },
        rate_limit: { rpm: 60, burst: 10 },
        auth: { type: "public" },
        license: { ai_input: true, ai_train: false, attribution: true },
        conformance: "L3"
      },

      blog: {
        $pact: "1.0",
        $s: "pact:news/article@1",
        $t: 1710590400,
        $ttl: 600,
        items: [
          {
            id: "post-001",
            n: "PACT 프로토콜 시작하기",
            au: "PACT 팀",
            dt: "2026-03-15",
            sum: "5분 안에 콘텐츠를 AI 에이전트 친화적으로 만드는 방법을 알아보세요.",
            url: "/blog/getting-started-with-pact"
          },
          {
            id: "post-002",
            n: "토큰 효율성이 중요한 이유",
            au: "PACT 팀",
            dt: "2026-03-10",
            sum: "HTML은 구조화 데이터보다 57배 더 많은 토큰을 낭비합니다.",
            url: "/blog/token-efficiency"
          }
        ],
        total: 2,
        page: { offset: 0, limit: 20 }
      },

      restaurant: {
        $pact: "1.0",
        $s: "pact:food/restaurant@1",
        $t: 1710590400,
        $ttl: 3600,
        items: [
          {
            id: "rest-42",
            n: "서울키친",
            cui: "한식",
            r: 4.7,
            pr: "$$",
            addr: "서울 강남구 강남대로 123",
            ph: "+82-2-555-0142",
            hrs: "11:00-22:00"
          }
        ],
        total: 1
      }
    };

    // --- 타입 감지 ---
    function detectType(obj) {
      if (obj.pact && obj.site && (obj.schemas || obj.endpoints)) return 'discovery';
      if (obj.$pact && (obj.$s || obj.$layout)) return 'response';
      return 'unknown';
    }

    // --- 디스커버리 검증 ---
    function validateDiscovery(obj) {
      var errors = [];
      var warnings = [];
      var checks = [];

      if (!obj.pact) {
        errors.push('필수 필드 누락: "pact" (버전 문자열)');
        checks.push({ pass: false, text: '"pact" 버전 필드' });
      } else {
        checks.push({ pass: true, text: '"pact" 버전: ' + obj.pact });
      }

      if (!obj.site) {
        errors.push('필수 필드 누락: "site" (도메인 문자열)');
        checks.push({ pass: false, text: '"site" 도메인' });
      } else if (typeof obj.site !== 'string') {
        errors.push('"site"는 객체가 아닌 문자열(도메인 이름)이어야 합니다');
        checks.push({ pass: false, text: '"site"는 문자열이어야 함' });
      } else {
        checks.push({ pass: true, text: '"site": ' + obj.site });
      }

      if (obj.description) {
        checks.push({ pass: true, text: '"description" 제공됨' });
      } else {
        warnings.push('"description" 필드 권장');
      }

      if (!obj.schemas || !Array.isArray(obj.schemas)) {
        errors.push('"schemas" 배열이 누락되었거나 유효하지 않습니다');
        checks.push({ pass: false, text: '"schemas" 배열' });
      } else if (obj.schemas.length === 0) {
        warnings.push('"schemas" 배열이 비어있습니다');
        checks.push({ pass: true, text: '"schemas" 배열 (비어있음)' });
      } else {
        checks.push({ pass: true, text: '"schemas": ' + obj.schemas.length + '개 스키마' });
        obj.schemas.forEach(function(s) {
          if (!/^pact:[a-z]+\/[a-z0-9-]+@\d+/.test(s)) {
            warnings.push('스키마 "' + s + '"이 pact:domain/type@version 형식에 맞지 않을 수 있습니다');
          }
        });
      }

      if (!obj.endpoints || typeof obj.endpoints !== 'object' || Array.isArray(obj.endpoints)) {
        errors.push('"endpoints"가 누락되었거나 유효하지 않습니다 (스키마 ID를 엔드포인트 정의에 매핑하는 객체여야 합니다)');
        checks.push({ pass: false, text: '"endpoints" 객체' });
      } else {
        var epKeys = Object.keys(obj.endpoints);
        if (epKeys.length === 0) {
          warnings.push('"endpoints"가 비어있습니다');
        }
        checks.push({ pass: true, text: '"endpoints": ' + epKeys.length + '개 스키마 매핑' });
        epKeys.forEach(function(key) {
          var ep = obj.endpoints[key];
          if (!ep.list && !ep.item && !ep.search) {
            warnings.push('엔드포인트 "' + key + '"에 list/item/search 경로가 없습니다');
          }
        });
      }

      if (obj.rate_limit) {
        if (obj.rate_limit.rpm) {
          checks.push({ pass: true, text: '"rate_limit": 분당 ' + obj.rate_limit.rpm + '회' });
        } else {
          warnings.push('"rate_limit"이 있지만 "rpm"이 없습니다');
        }
      }

      if (obj.auth) {
        checks.push({ pass: true, text: '"auth": ' + (obj.auth.type || '정의됨') });
      }

      if (obj.license) {
        checks.push({ pass: true, text: '"license" 정의됨' });
      }

      if (obj.conformance) {
        checks.push({ pass: true, text: '"conformance": ' + obj.conformance });
      }

      if (obj.platforms) {
        checks.push({ pass: true, text: '"platforms": ' + Object.keys(obj.platforms).join(', ') });
      }

      return { errors: errors, warnings: warnings, checks: checks };
    }

    // --- 응답 검증 ---
    function validateResponse(obj) {
      var errors = [];
      var warnings = [];
      var checks = [];

      if (!obj.$pact) {
        errors.push('필수 필드 누락: "$pact" (버전 문자열)');
        checks.push({ pass: false, text: '"$pact" 버전 필드' });
      } else {
        checks.push({ pass: true, text: '"$pact" 버전: ' + obj.$pact });
      }

      if (!obj.$s) {
        errors.push('필수 필드 누락: "$s" (스키마 URI)');
        checks.push({ pass: false, text: '"$s" 스키마 URI' });
      } else {
        checks.push({ pass: true, text: '"$s": ' + obj.$s });
        if (!/^pact:[a-z]+\/[a-z0-9-]+@\d+/.test(obj.$s)) {
          warnings.push('"$s"가 pact:domain/type@version 형식에 맞지 않을 수 있습니다');
        }
      }

      if (obj.$t) {
        checks.push({ pass: true, text: '"$t": ' + new Date(obj.$t * 1000).toISOString() });
      } else {
        warnings.push('"$t" (Unix 타임스탬프) 권장');
      }

      if (obj.$ttl) {
        checks.push({ pass: true, text: '"$ttl": ' + obj.$ttl + '초 캐시' });
      }

      var isTable = obj.$layout === 'table';
      if (isTable) {
        checks.push({ pass: true, text: '"$layout": table (열 기반 형식)' });
        if (!obj.cols || !Array.isArray(obj.cols)) {
          errors.push('테이블 레이아웃은 "cols" 배열이 필요합니다');
          checks.push({ pass: false, text: '"cols" 배열' });
        } else {
          checks.push({ pass: true, text: '"cols": ' + obj.cols.length + '개 열' });
        }
        if (!obj.rows || !Array.isArray(obj.rows)) {
          errors.push('테이블 레이아웃은 "rows" 배열이 필요합니다');
          checks.push({ pass: false, text: '"rows" 배열' });
        } else {
          checks.push({ pass: true, text: '"rows": ' + obj.rows.length + '개 행' });
          if (obj.cols && obj.rows.length > 0 && obj.rows[0].length !== obj.cols.length) {
            warnings.push('행 길이(' + obj.rows[0].length + ')가 열 길이(' + obj.cols.length + ')와 다릅니다');
          }
        }
      }

      if (!isTable) {
        if (!obj.items || !Array.isArray(obj.items)) {
          errors.push('"items" 배열이 누락되었습니다');
          checks.push({ pass: false, text: '"items" 배열' });
        } else {
          checks.push({ pass: true, text: '"items": ' + obj.items.length + '개 항목' });
        }
      }

      if (typeof obj.total === 'number') {
        checks.push({ pass: true, text: '"total": ' + obj.total });
      }

      if (obj.page) {
        checks.push({ pass: true, text: '"page": offset=' + (obj.page.offset || 0) + ', limit=' + (obj.page.limit || '?') });
      }

      return { errors: errors, warnings: warnings, checks: checks };
    }

    // --- 적합도 등급 판정 ---
    function determineConformance(type, obj) {
      if (type === 'discovery') {
        var hasBasic = obj.pact && obj.site;
        var hasSchemas = obj.schemas && obj.schemas.length > 0;
        var hasEndpoints = obj.endpoints && Object.keys(obj.endpoints).length > 0;
        var hasSearch = false;
        if (hasEndpoints) {
          Object.keys(obj.endpoints).forEach(function(k) {
            if (obj.endpoints[k].search) hasSearch = true;
          });
        }
        var hasAuth = !!(obj.auth && obj.auth.type && obj.auth.type !== 'public');
        var hasLicense = !!obj.license;

        if (hasAuth && hasLicense) return 'L4';
        if (hasSearch && hasEndpoints) return 'L3';
        if (hasSchemas && hasEndpoints) return 'L2';
        if (hasBasic) return 'L1';
        return 'L0';
      }

      if (type === 'response') {
        var hasPact = !!obj.$pact;
        var hasS = !!obj.$s;
        var hasPage = !!obj.page || obj.$layout === 'table';
        var hasTtl = typeof obj.$ttl === 'number';

        if (hasPage && hasTtl) return 'L3';
        if (hasS) return 'L2';
        if (hasPact) return 'L1';
        return 'L0';
      }

      return '알 수 없음';
    }

    // --- 메인 검증 함수 ---
    function validate() {
      var input = document.getElementById('jsonInput').value.trim();
      var resultsBody = document.getElementById('resultsBody');
      var badge = document.getElementById('resultBadge');

      if (!input) {
        showError('검증할 JSON을 입력해주세요.');
        return;
      }

      var obj;
      try {
        obj = JSON.parse(input);
      } catch (e) {
        showError('유효하지 않은 JSON: ' + e.message);
        badge.innerHTML = '<span class="badge badge--error">파싱 오류</span>';
        return;
      }

      var selectedType = document.getElementById('typeSelect').value;
      var type = selectedType === 'auto' ? detectType(obj) : selectedType;

      if (type === 'unknown') {
        showError('PACT 타입을 감지할 수 없습니다. 수동으로 타입을 선택하거나, JSON에 "pact"/"site" (디스커버리) 또는 "$pact"/"$s" (응답) 필드가 있는지 확인해주세요.');
        badge.innerHTML = '<span class="badge badge--warning">알 수 없는 타입</span>';
        return;
      }

      var result;
      if (type === 'discovery') {
        result = validateDiscovery(obj);
      } else {
        result = validateResponse(obj);
      }

      var conformance = determineConformance(type, obj);
      var isValid = result.errors.length === 0;

      var html = '';

      // 요약
      html += '<div class="result-summary">';
      if (isValid) {
        html += '<span class="result-status result-status--valid">유효함</span>';
        badge.innerHTML = '<span class="badge">유효</span>';
      } else {
        html += '<span class="result-status result-status--invalid">유효하지 않음</span>';
        badge.innerHTML = '<span class="badge badge--error">오류</span>';
      }
      var typeLabels = { discovery: '디스커버리', response: '응답' };
      html += '<span class="badge badge--info">' + (typeLabels[type] || type.toUpperCase()) + '</span>';
      html += '<span class="badge">' + conformance + '</span>';
      html += '</div>';

      // 구조 검사
      html += '<div class="result-section">';
      html += '<div class="result-section__title">구조 검사</div>';
      html += '<ul class="result-list">';
      result.checks.forEach(function(c) {
        var cls = c.pass ? 'icon--pass' : 'icon--fail';
        var sym = c.pass ? '[ok]' : '[!!]';
        html += '<li><span class="icon ' + cls + '">' + sym + '</span> ' + escapeHtml(c.text) + '</li>';
      });
      html += '</ul></div>';

      // 오류
      if (result.errors.length > 0) {
        html += '<div class="result-section">';
        html += '<div class="result-section__title">오류 (' + result.errors.length + '개)</div>';
        html += '<ul class="result-list">';
        result.errors.forEach(function(e) {
          html += '<li><span class="icon icon--fail">[!!]</span> ' + escapeHtml(e) + '</li>';
        });
        html += '</ul></div>';
      }

      // 경고
      if (result.warnings.length > 0) {
        html += '<div class="result-section">';
        html += '<div class="result-section__title">경고 (' + result.warnings.length + '개)</div>';
        html += '<ul class="result-list">';
        result.warnings.forEach(function(w) {
          html += '<li><span class="icon icon--warn">[~]</span> ' + escapeHtml(w) + '</li>';
        });
        html += '</ul></div>';
      }

      // 적합도 등급
      html += '<div class="result-section">';
      html += '<div class="result-section__title">적합도 등급</div>';
      html += '<p style="font-family:var(--font-mono);font-size:1.25rem;font-weight:700;color:var(--accent);">' + conformance + '</p>';
      var conformanceLabels = { L0: '미적합', L1: '탐색 가능', L2: '타입 지정', L3: '효율적', L4: '신뢰' };
      html += '<p class="text-muted text-sm mt-1">' + (conformanceLabels[conformance] || '') + '</p>';
      html += '</div>';

      resultsBody.innerHTML = html;
    }

    function showError(msg) {
      var resultsBody = document.getElementById('resultsBody');
      resultsBody.innerHTML =
        '<div class="result-section">' +
        '<p style="color:var(--error);font-size:0.9rem;">' + escapeHtml(msg) + '</p>' +
        '</div>';
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    function loadExample(name) {
      var example = EXAMPLES[name];
      if (!example) return;
      document.getElementById('jsonInput').value = JSON.stringify(example, null, 2);
      document.getElementById('typeSelect').value = 'auto';
      validate();
    }

    function formatJson() {
      var input = document.getElementById('jsonInput');
      try {
        var obj = JSON.parse(input.value);
        input.value = JSON.stringify(obj, null, 2);
      } catch (e) {
        showError('정렬 실패: 유효하지 않은 JSON입니다.');
      }
    }

    function clearInput() {
      document.getElementById('jsonInput').value = '';
      document.getElementById('resultsBody').innerHTML =
        '<div class="results-empty">PACT JSON을 입력하고 <strong>검증하기</strong>를 클릭하세요.</div>';
      document.getElementById('resultBadge').innerHTML = '';
    }
  </script>
</body>
</html>
